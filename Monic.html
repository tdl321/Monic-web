function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight  = Math.max(PAD, window.innerWidth  - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight,  Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right  = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode')   setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight  = window.innerWidth  - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight  - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup',   up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup',   up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>x</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label }) {

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>

}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const i = Math.floor(((clientX - r.left - 2) / (r.width - 4)) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (trackRef.current) { const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); } };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, multiline, onChange }) {
  if (multiline) {
    return (
      <TweakRow label={label}>
        <textarea className="twk-field" value={value} placeholder={placeholder} rows={4}
                  style={{ height: 'auto', resize: 'vertical', padding: '6px 8px', lineHeight: 1.4 }}
                  onChange={(e) => onChange(e.target.value)} />
      </TweakRow>
    );
  }
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

// ---- monic-v2 ---------------------------------------------------------------

function flattenToText(children) {
  if (children == null || children === false) return '';
  if (typeof children === 'string') return children;
  if (typeof children === 'number') return String(children);
  if (Array.isArray(children)) return children.map(flattenToText).join('');
  if (React.isValidElement(children)) return flattenToText(children.props.children);
  return '';
}

function Reactive({ children, mouse, t, r: R = 30, style: extra = {}, className = '' }) {
  const ref = React.useRef(null);
  const [items, setItems] = React.useState([]);
  const text = flattenToText(children);

  React.useLayoutEffect(() => {
    const el = ref.current;
    if (!el) return;
    const root = el.closest('[data-monic-root]')?.getBoundingClientRect();
    if (!root) return;
    const cs = Array.from(el.querySelectorAll('[data-g]')).map(g => {
      const r = g.getBoundingClientRect();
      return {
        el: g,
        cx: r.left - root.left + r.width  / 2,
        cy: r.top  - root.top  + r.height / 2,
        original: g.dataset.orig,
      };
    });
    setItems(cs);
  }, [text]);

  React.useEffect(() => {
    if (!mouse.active) {
      items.forEach(it => {
        it.el.textContent  = it.original === ' ' ? ' ' : it.original;
        it.el.style.transform = '';
        it.el.style.opacity   = '1';
      });
      return;
    }
    items.forEach(it => {
      const dx = it.cx - mouse.x;
      const dy = it.cy - mouse.y;
      const d  = Math.hypot(dx, dy) || 0.001;
      if (d < R && it.original !== ' ') {
        const push = R - d;
        it.el.style.transform = `translate(${(dx / d) * push}px, ${(dy / d) * push}px)`;
      } else {
        it.el.style.transform = '';
      }
      it.el.style.opacity = '1';
    });
  }, [mouse, t, items]);

  return (
    <span ref={ref} className={className} style={extra}>
      {text.split('').map((ch, i) =>
        ch === ' '
          ? <span key={i}> </span>
          : <span key={i} data-g data-orig={ch}
                  style={{ display: 'inline-block', transition: 'transform .12s ease-out' }}>
              {ch}
            </span>
      )}
    </span>
  );
}

function buildWordmarkRows(letters, gap) {
  const rows = [];
  for (let r = 0; r < ROWS_PER_LETTER; r++) {
    let line = '';
    for (let i = 0; i < letters.length; i++) {
      line += LETTER_MASKS[letters[i]][r];
      if (i < letters.length - 1) line += '.'.repeat(gap);
    }
    rows.push(line);
  }
  return rows;
}

function WordmarkAscii({ mouse, tick, fontSize, color, weight, letterSpacing }) {
  const phase = Math.floor(tick / 5);
  const rows  = buildWordmarkRows('MONIC', 3);
  return (
    <div style={{ display: 'inline-block', fontSize, lineHeight: 1.0, letterSpacing, fontWeight: weight, color, whiteSpace: 'pre' }}>
      {rows.map((row, ry) => {
        const text = row.split('').map((cell, cx) => {
          if (cell === '.') return ' ';
          const seed = (phase * 73856093) ^ (ry * 19349663) ^ (cx * 83492791);
          return WORDMARK_POOL[Math.abs(seed) % WORDMARK_POOL.length];
        }).join('');
        return <div key={ry}><Reactive mouse={mouse} t={tick}>{text}</Reactive></div>;
      })}
    </div>
  );
}

function LogoM({ mouse, tick, color }) {
  const phase = Math.floor(tick / 5);

}

function MonicV2({ tweaks, page, onNavigate }) {
  const t = tweaks;
  const rootRef = React.useRef(null);
  const [mouse, setMouse] = React.useState({ x: -9999, y: -9999, active: false });
  const [tick,  setTick]  = React.useState(0);

  React.useEffect(() => {
    let raf;
    const loop = () => { setTick(x => x + 1); raf = requestAnimationFrame(loop); };
    raf = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf);
  }, []);

  const coords = (clientX, clientY) => {
    const r = rootRef.current.getBoundingClientRect();
    return { x: clientX - r.left, y: clientY - r.top };
  };
  const onMouseMove  = (e) => setMouse({ ...coords(e.clientX, e.clientY), active: true });
  const onMouseLeave = ()  => setMouse(m => ({ ...m, active: false }));
  const onTouchMove  = (e) => { const t = e.touches[0]; setMouse({ ...coords(t.clientX, t.clientY), active: true }); };
  const onTouchEnd   = ()  => setMouse(m => ({ ...m, active: false }));

  const fontFamily = t.font === 'jetbrains'
    ? '"JetBrains Mono", ui-monospace, monospace'
    : t.font === 'plex'
    ? '"IBM Plex Mono", ui-monospace, monospace'
    : '"Roboto Mono", ui-monospace, monospace';

  const bg      = t.dark ? '#0a0a0a' : '#fafaf7';
  const fg      = t.dark ? '#f4f4f1' : '#0a0a0a';
  const fgDim   = t.dark ? 'rgba(244,244,241,0.55)' : 'rgba(0,0,0,0.55)';
  const fgFaint = t.dark ? 'rgba(244,244,241,0.4)'  : 'rgba(0,0,0,0.42)';

  const wmFontSize = `clamp(3.5px, ${t.wordmarkScale * 0.10}vw, ${Math.round(t.wordmarkScale * 1.4)}px)`;

  return (
    <div
      ref={rootRef}
      data-monic-root
      onMouseMove={onMouseMove}
      onMouseLeave={onMouseLeave}
      onTouchMove={onTouchMove}
      onTouchEnd={onTouchEnd}
      style={{
        display: 'flex', flexDirection: 'column',
        width: '100%', minHeight: '100vh',
        background: bg, color: fg, fontFamily,
        fontSize: 14, cursor: 'default',
        transition: 'background .2s, color .2s',
        overflowX: 'hidden',
      }}
    >
      {/* header nav */}
      <div style={{
        display: 'flex', alignItems: 'center', flexShrink: 0,
        padding: 'clamp(24px, 5vw, 56px) clamp(20px, 5vw, 64px) 0',
        gap: 'clamp(14px, 2vw, 28px)',
      }}>
        {['HOME', 'TEAM', 'BLOG'].map(label => (
          <span
            key={label}
            onClick={() => onNavigate(label.toLowerCase())}
            style={{
              fontSize: 'clamp(9px, 1vw, 11px)',
              letterSpacing: '0.22em',
              textTransform: 'uppercase',
              color: page === label.toLowerCase() ? fg : fgDim,
              cursor: 'default',
              userSelect: 'none',
              transition: 'color .15s',
            }}
          >
            {`[${label}]`}
          </span>
        ))}
      </div>

      {page === 'home' && <HomePage mouse={mouse} tick={tick} fg={fg} fgDim={fgDim} t={t} wmFontSize={wmFontSize} />}
      {page === 'team' && <TeamPage mouse={mouse} tick={tick} fg={fg} fgDim={fgDim} />}
      {page === 'blog' && <BlogPage fgDim={fgDim} />}

      {/* footer */}
      <div style={{
        flexShrink: 0, textAlign: 'center',
        padding: 'clamp(16px, 2vw, 28px) clamp(20px, 5vw, 64px)',
        fontSize: 'clamp(9px, 1vw, 11px)', letterSpacing: '0.22em', textTransform: 'uppercase',
        color: fgDim,
      }}>
        <a href="https://t.me/monictrading" target="_blank" rel="noopener noreferrer"
           style={{ display: 'inline-block', marginBottom: 12, color: fg, opacity: 0.5, transition: 'opacity .15s' }}
           onMouseEnter={e => e.currentTarget.style.opacity = '1'}
           onMouseLeave={e => e.currentTarget.style.opacity = '0.5'}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.93 6.686-1.685 7.941c-.127.566-.46.703-.933.437l-2.57-1.893-1.24 1.193c-.137.137-.253.253-.52.253l.185-2.619 4.772-4.309c.207-.184-.046-.286-.32-.103L8.733 13.94l-2.54-.793c-.552-.175-.563-.552.116-.818l9.926-3.828c.46-.166.863.113.695.185z"
                  fill="currentColor"/>
          </svg>
        </a>
        <div><Reactive mouse={mouse} t={tick}>{'© 2026 Monic Trading'}</Reactive></div>
      </div>

    </div>
  );
}
